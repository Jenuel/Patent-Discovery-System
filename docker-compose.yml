services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: patent-discovery/api:latest
    container_name: patent_api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      ENV: ${ENV:-production}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-models/gemini-2.5-flash}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_PATENT_INDEX_HOST: ${PINECONE_PATENT_INDEX_HOST}
      PINECONE_CLAIM_INDEX_HOST: ${PINECONE_CLAIM_INDEX_HOST}
      PINECONE_NAMESPACE: ${PINECONE_NAMESPACE:-default}
      ELASTICSEARCH_CLOUD_ID: ${ELASTICSEARCH_CLOUD_ID}
      ELASTICSEARCH_API_KEY: ${ELASTICSEARCH_API_KEY}
      ELASTICSEARCH_INDEX_NAME: ${ELASTICSEARCH_INDEX_NAME:-hupd_sparse}
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-patent_database}
      MONGODB_COLLECTION: ${MONGODB_COLLECTION:-patent_chunks}
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - patent_net

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    image: patent-discovery/frontend:latest
    container_name: patent_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - patent_net

networks:
  patent_net:
    driver: bridge
